input {
  kafka {
    bootstrap_servers => ["kafka:29092"]
    topics => ["devopssuite-logs"]
    group_id => "logstash-group"
    codec => json
  }
}

filter {
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "devopssuite-logs-%{+YYYY.MM.dd}"
  }
}
