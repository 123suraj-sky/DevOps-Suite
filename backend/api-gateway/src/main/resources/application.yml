spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=2
        - id: project-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/projects/**
          filters:
            - StripPrefix=2
        - id: code-execution-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/execution/**
          filters:
            - StripPrefix=2
        - id: logging-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/logs/**
          filters:
            - StripPrefix=2
        - id: metrics-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/metrics/**
          filters:
            - StripPrefix=2
        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=2
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
jwt:
  secret: ${JWT_SECRET:your-secret-key-minimum-256-bits}
  expiration: 86400000
logging:
  level:
    root: INFO
    com.devopssuite.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
